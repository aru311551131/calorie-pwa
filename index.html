<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f8f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="每日營養" />
    <title>每日營養紀錄</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">PWA Nutrition Tracker</p>
          <h1>每日營養紀錄</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="updateButton" type="button" title="清除快取並重新載入，不影響紀錄資料">
            <span aria-hidden="true">↻</span>
            <span class="button-text">更新版本</span>
          </button>
          <button class="icon-button danger" id="resetButton" type="button" title="清除所有本機資料">
            <span aria-hidden="true">×</span>
            <span class="button-text">重置</span>
          </button>
        </div>
      </header>

      <section class="auth-pane" aria-labelledby="authTitle">
        <div>
          <p class="eyebrow">Cloud Sync</p>
          <h2 id="authTitle">信箱登入同步</h2>
          <p class="auth-status" id="authStatus">未登入，本機資料只會留在這台裝置。</p>
        </div>
        <form class="auth-form" id="authForm">
          <label>
            Email
            <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            密碼
            <input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="至少 6 碼" required />
          </label>
          <button class="primary-button" type="submit">登入</button>
          <button class="secondary-button" id="signUpButton" type="button">建立帳號</button>
          <button class="text-button" id="resetPasswordButton" type="button">設定/忘記密碼</button>
        </form>
        <form class="auth-form" id="newPasswordForm" hidden>
          <label>
            新密碼
            <input id="newPasswordInput" type="password" autocomplete="new-password" minlength="6" placeholder="至少 6 碼" required />
          </label>
          <button class="primary-button" type="submit">儲存新密碼</button>
        </form>
        <div class="auth-actions">
          <button class="secondary-button" id="manualSyncButton" type="button" disabled>立即同步</button>
          <button class="text-button danger" id="signOutButton" type="button" hidden>登出</button>
        </div>
      </section>

      <main class="workspace">
        <section class="calendar-pane" aria-labelledby="calendarTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Calendar</p>
              <h2 id="calendarTitle">日曆</h2>
            </div>
            <div class="month-controls">
              <button class="square-button" id="prevMonth" type="button" title="上一個月">‹</button>
              <button class="square-button" id="todayButton" type="button">今天</button>
              <button class="square-button" id="nextMonth" type="button" title="下一個月">›</button>
            </div>
          </div>
          <div class="month-label" id="monthLabel"></div>
          <div class="weekday-grid" aria-hidden="true">
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
            <span>日</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <section class="day-pane" aria-labelledby="dayTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Daily Log</p>
              <h2 id="dayTitle">選取日期</h2>
            </div>
            <div class="summary-strip" aria-label="當日加總">
              <div>
                <span id="dailyWeight">--</span>
                <small>kg 體重</small>
              </div>
              <div>
                <span id="dailyCalories">0</span>
                <small>kcal</small>
              </div>
              <div>
                <span id="dailyProtein">0</span>
                <small>g 蛋白質</small>
              </div>
            </div>
          </div>

          <form class="weight-form" id="weightForm">
            <label>
              體重 kg
              <input id="weightInput" type="text" inputmode="decimal" autocomplete="off" placeholder="例如：60.15" />
            </label>
            <button class="secondary-button" type="submit">儲存體重</button>
            <button class="text-button danger" id="clearWeightButton" type="button">清除體重</button>
          </form>

          <form class="entry-form" id="entryForm">
            <label>
              日期
              <input id="entryDate" type="date" required />
            </label>
            <label>
              食物名稱
              <input id="entryName" type="text" placeholder="例如：雞胸肉便當" autocomplete="off" required />
            </label>
            <label>
              蛋白質 g
              <input id="entryProtein" type="number" min="0" step="0.1" inputmode="decimal" required />
            </label>
            <label>
              熱量 kcal
              <input id="entryCalories" type="number" min="0" step="1" inputmode="decimal" required />
            </label>
            <button class="primary-button" type="submit">加入紀錄</button>
          </form>

          <div class="entry-list" id="entryList" aria-live="polite"></div>
        </section>

        <section class="export-pane" aria-labelledby="exportTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Export</p>
              <h2 id="exportTitle">輸出數據</h2>
            </div>
          </div>
          <form class="export-form" id="exportForm">
            <label>
              開始日期
              <input id="exportStartDate" type="date" required />
            </label>
            <label>
              結束日期
              <input id="exportEndDate" type="date" required />
            </label>
            <button class="primary-button" type="submit">輸出 CSV</button>
          </form>
        </section>

        <section class="food-pane" aria-labelledby="foodTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Food Table</p>
              <h2 id="foodTitle">熱量蛋白質表</h2>
            </div>
            <input class="search-input" id="foodSearch" type="search" placeholder="搜尋食物" />
          </div>

          <div class="calculator-row">
            <label>
              食物
              <select id="foodSelect"></select>
            </label>
            <label>
              <span id="servingLabel">份數</span>
              <input id="servingAmount" type="number" min="0" step="0.1" inputmode="decimal" value="1" />
            </label>
            <div class="calculator-output" aria-label="份量計算結果">
              <strong id="calcCalories">0 kcal</strong>
              <span id="calcProtein">0 g 蛋白質</span>
            </div>
          </div>

          <div class="food-table-wrap">
            <table class="food-table">
              <thead>
                <tr>
                  <th>食物</th>
                  <th>基準</th>
                  <th>熱量</th>
                  <th>蛋白質</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="foodTableBody"></tbody>
            </table>
          </div>

          <details class="custom-food">
            <summary>新增自己的食物到營養表</summary>
            <form id="foodForm" class="food-form">
              <label>
                食物名稱
                <input id="foodName" type="text" placeholder="例如：常買的雞肉沙拉" required />
              </label>
              <label>
                基準
                <input id="foodBasis" type="text" placeholder="例如：100g 生食重、1顆、1包、1份" required />
              </label>
              <label>
                熱量 kcal / 基準
                <input id="foodCalories" type="number" min="0" step="1" inputmode="decimal" required />
              </label>
              <label>
                蛋白質 g / 基準
                <input id="foodProtein" type="number" min="0" step="0.1" inputmode="decimal" required />
              </label>
              <button class="primary-button" type="submit">新增食物</button>
            </form>
          </details>
        </section>
      </main>
    </div>

    <template id="entryTemplate">
      <article class="entry-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <button class="text-button danger" type="button">刪除</button>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
